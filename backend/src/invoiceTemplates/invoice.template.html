<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th,
        td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .total {
            text-align: right;
            font-size: 20px;
            margin-top: 30px;
        }
    </style>
</head>


<body>


    <div class="header">

        <div>
            <h1>{{businessName}}</h1>
            <p>{{businessEmail}}</p>
        </div>

        <div>
            <h2>Invoice</h2>
            <p>{{invoiceNumber}}</p>
        </div>

    </div>


    <h3>Customer</h3>

    <p>
        {{customerName}}
    </p>


    <table>

        <thead>
            <tr>
                <th>Description</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>


        <tbody>

            {{items}}

        </tbody>


    </table>


    <div class="total">

        Total: {{total}}

    </div>


</body>

</html>
